<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 900" role="img" aria-label="AI on the Front Line cover">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#001321"/>
      <stop offset="45%" stop-color="#0a253f"/>
      <stop offset="100%" stop-color="#12304a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.2" y1="0" x2="0.9" y2="1">
      <stop offset="0%" stop-color="#faa31b" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#faa31b" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grain" width="80" height="80" patternUnits="userSpaceOnUse">
      <circle cx="8" cy="12" r="1" fill="#fff" opacity="0.06"/>
      <circle cx="42" cy="28" r="1.2" fill="#fff" opacity="0.05"/>
      <circle cx="66" cy="54" r="1" fill="#000" opacity="0.08"/>
      <circle cx="22" cy="68" r="0.8" fill="#fff" opacity="0.04"/>
    </pattern>
  </defs>
  <rect width="640" height="900" fill="url(#bg)"/>
  <circle cx="500" cy="140" r="220" fill="url(#glow)"/>
  <rect width="640" height="900" fill="url(#grain)"/>
  <rect x="48" y="48" width="544" height="804" fill="none" stroke="#8ad3d6" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="80" y="140" fill="#8ad3d6" font-family="Georgia, serif" font-size="20" letter-spacing="3">SEATTLE - WASHINGTON STATE</text>
  <text x="80" y="310" fill="#ffffff" font-family="Georgia, serif" font-size="52" font-weight="700">AI on the</text>
  <text x="80" y="380" fill="#ffffff" font-family="Georgia, serif" font-size="52" font-weight="700">Front Line</text>
  <line x1="80" y1="420" x2="220" y2="420" stroke="#00a3af" stroke-width="3"/>
  <text x="80" y="480" fill="#c5e9eb" font-family="Helvetica, Arial, sans-serif" font-size="20">
    <tspan x="80" dy="0">A field guide for Seattle-area</tspan>
    <tspan x="80" dy="30">police, fire &amp; EMS - and the</tspan>
    <tspan x="80" dy="30">policies now catching up</tspan>
  </text>
  <text x="80" y="780" fill="#8ad3d6" font-family="Helvetica, Arial, sans-serif" font-size="16" letter-spacing="2">FREE DOWNLOAD</text>
</svg>
